# HTTP → HTTPS www
server {
    listen 80;
    listen [::]:80;
    server_name harshtoletservices.in www.harshtoletservices.in;
    return 301 https://www.harshtoletservices.in$request_uri;
}

# HTTPS apex (no www) → HTTPS www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name harshtoletservices.in;

    ssl_certificate /etc/letsencrypt/live/harshtoletservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harshtoletservices.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.harshtoletservices.in$request_uri;
}

# HTTPS www — main site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.harshtoletservices.in;

    ssl_certificate /etc/letsencrypt/live/harshtoletservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harshtoletservices.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/harshtoletservices/frontend/dist;
    index index.html;

    client_max_body_size 55M;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic sitemap includes all active property & project URLs
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:5000/api/public/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
